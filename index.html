<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AgentMemory.fyi — Visual AI Memory Manager</title>
    <meta name="description" content="Visually manage memory for AI agents like Claude Code, Cursor, and Copilot. Import, search, visualize, and export your AI agent memories." />
    <script>
      // Apply theme synchronously to prevent flash of light theme on first paint
      (function () {
        try {
          var t = localStorage.getItem('agentmemory-theme');
          if (t !== 'dark' && t !== 'light') t = 'dark';
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) { /* localStorage unavailable */ }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
